<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <!-- Background -->
  <rect width="100" height="100" fill="#1a1a2e" rx="20"/>
  
  <!-- Play button (anime symbol) -->
  <g transform="translate(50, 50)">
    <!-- Triangle (play) -->
    <polygon points="0,-25 20,15 -20,15" fill="#ff6b6b"/>
    
    <!-- Film reel -->
    <circle cx="-25" cy="0" r="8" fill="none" stroke="#4ecdc4" stroke-width="2"/>
    <circle cx="-25" cy="0" r="3" fill="#4ecdc4"/>
    
    <circle cx="25" cy="0" r="8" fill="none" stroke="#4ecdc4" stroke-width="2"/>
    <circle cx="25" cy="0" r="3" fill="#4ecdc4"/>
  </g>
  
  <!-- Text -->
  <text x="50" y="85" font-family="Arial, sans-serif" font-size="8" font-weight="bold" text-anchor="middle" fill="#fff">
    JK
  </text>
</svg>
